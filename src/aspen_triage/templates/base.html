<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}aspen-triage{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <nav class="topnav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="brand-icon">A</span>
        <span class="brand-text">aspen-triage</span>
      </a>
      <div class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/issues">Issues</a>
        <a href="/groups">Groups</a>
        <a href="/search">Search</a>
        <a href="/settings">Settings</a>
        <a href="/about">About</a>
      </div>
      {% if request.state.user %}
      <div class="nav-user">
        <span class="user-name">{{ request.state.user.name or request.state.user.email }}</span>
        <a href="/logout" class="nav-logout">Logout</a>
      </div>
      {% endif %}
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>
      <a href="https://github.com/brendan1226/aspen-triage">Source</a>
      · v0.0.1
      · <a href="https://aspen-discovery.atlassian.net/browse/DIS">Aspen JIRA</a>
    </p>
  </footer>
</body>
</html>
